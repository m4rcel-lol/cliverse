version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "6969:6969"
      - "127.0.0.1:8080:8080"
    environment:
      - DOMAIN=${DOMAIN}
      - INSTANCE_NAME=${INSTANCE_NAME}
      - DATABASE_DSN=postgres://cliverse:${POSTGRES_PASSWORD}@postgres:5432/cliverse?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - SESSION_SECRET=${SESSION_SECRET}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
    volumes:
      - app_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cliverse

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    environment:
      - DOMAIN=${DOMAIN}
      - DATABASE_DSN=postgres://cliverse:${POSTGRES_PASSWORD}@postgres:5432/cliverse?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cliverse

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cliverse
      POSTGRES_USER: cliverse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql
      - ./migrations/002_blocks_mutes.sql:/docker-entrypoint-initdb.d/002_blocks_mutes.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cliverse"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cliverse

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cliverse

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - cliverse

volumes:
  postgres_data:
  redis_data:
  app_data:
  caddy_data:
  caddy_config:

networks:
  cliverse:
    driver: bridge
